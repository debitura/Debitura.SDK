name: publish

# ============================================================================
# LIVE — this workflow publishes the official Customer API SDK packages:
#   • npm   @debitura/debt-collection   (granular automation token + provenance)
#   • PyPI  debitura-debt-collection    (trusted publishing / OIDC, tokenless)
# Both went live at v1.0.0 on 2026-06-23.
#
# It runs ONLY on a published GitHub Release or a manual workflow_dispatch —
# never on push. The two jobs pin to the `npm` and `pypi` GitHub Environments,
# each protected by a REQUIRED REVIEWER: the run pauses on that approval gate
# until a reviewer approves, which is what stops an unapproved publish on this
# public repo.
#
# To cut a release: see PUBLISHING.md, and the canonical operational runbook at
# Debitura.Wiki engineering/ops/sdk-publish-runbook.md.
# ============================================================================
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish @debitura/debt-collection to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # OIDC — npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build
        working-directory: typescript
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Publish (trusted publishing / provenance)
        working-directory: typescript
        run: npm publish --provenance --access public
        env:
          # Leave unset to use OIDC trusted publishing. If you use a token
          # instead, add NPM_TOKEN as a repo secret and keep this line.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish debitura-debt-collection to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # OIDC — PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          # Trusted publishing (OIDC) needs no token. If you use a token
          # instead, add PYPI_TOKEN as a repo secret and uncomment:
          # password: ${{ secrets.PYPI_TOKEN }}
